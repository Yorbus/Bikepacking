<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bikepack Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="top-bar" class="overlay">
        <div class="stat-item"><span class="stat-value" id="speed">0</span><span class="stat-label">km/u</span></div>
        <div class="stat-item"><span class="stat-value" id="altitude">-</span><span class="stat-label">hoogte</span>
        </div>
        <div class="stat-item"><span class="stat-value" id="avg-speed">0</span><span class="stat-label">gem.</span>
        </div>
        <div class="stat-item"><span class="stat-value" id="time">00:00</span><span class="stat-label">tijd</span></div>
    </div>

    <div id="menu-toggle" class="overlay" onclick="toggleMenu()">
        <div class="hamburger-line"></div>
    </div>

    <div id="map"></div>

    <div id="bottom-panel" class="overlay">
        <div class="progress-bar-bg">
            <div id="progress-fill"></div>
        </div>
        <div
            style="display:flex; justify-content:space-between; font-size:1.1rem; font-weight: bold; margin-bottom: 15px;">
            <span id="dist-done">0.0 km</span>
            <span id="dist-todo">Geen route</span>
        </div>
        <button id="start-nav-btn" class="btn-primary" style="display:none; margin-bottom:0;"
            onclick="startNavigation()">▶ START NAVIGATIE</button>
        <button id="stop-nav-btn" class="btn-primary" style="display:none; margin-bottom:0; background:#c0392b;"
            onclick="stopNavigation()">🛑 STOP</button>
    </div>

    <div id="main-menu" class="full-page">
        <button class="close-btn" onclick="toggleMenu()">&times;</button>
        <h2 style="color:var(--accent-bright); margin-bottom:40px;">Menu</h2>
        <button class="btn-primary" onclick="showRoutes()">🗺️ MIJN ROUTES</button>
        <button class="btn-primary" onclick="showSettings()" style="background:#333;">⚙️ INSTELLINGEN</button>
    </div>

    <div id="route-page" class="full-page">
        <button class="close-btn" onclick="closePages()">&times;</button>
        <h2 style="color:var(--accent-bright); margin-bottom:30px;">Mijn Routes</h2>
        <input type="file" id="gpx-file" style="display:none" accept=".gpx" multiple>
        <button class="btn-primary" onclick="document.getElementById('gpx-file').click()">+ VOEG GPX TOE</button>
        <div id="route-list"></div>
    </div>

    <div id="settings-page" class="full-page">
        <button class="close-btn" onclick="closePages()">&times;</button>
        <h2 style="color:var(--accent-bright); margin-bottom:30px;">Instellingen</h2>
        <p style="opacity:0.6;">Problemen met routes verwijderen?</p>
        <button class="btn-primary" onclick="resetApp()" style="background:#c0392b;">🔥 RESET ALLE DATA</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
