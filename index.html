<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bikepack Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="menu-toggle" class="overlay" onclick="toggleMenu()">
        <div class="hamburger-line"></div>
    </div>

    <div id="top-bar" class="overlay">
        <div class="stat-item"><span class="stat-value" id="speed">0</span><span class="stat-label">km/u</span></div>
        <div class="stat-item"><span class="stat-value" id="altitude">-</span><span class="stat-label">hoogte</span>
        </div>
        <div class="stat-item"><span class="stat-value" id="avg-speed">0</span><span class="stat-label">gem.</span>
        </div>
        <div class="stat-item"><span class="stat-value" id="time">00:00</span><span class="stat-label">tijd</span></div>
    </div>

    <div id="map"></div>

    <div id="bottom-panel" class="overlay">
        <div id="nav-instruction" class="nav-instruction" style="display:none;">
            <div class="nav-icon" id="nav-icon">↑</div>
            <div class="nav-text">
                <div id="nav-step">Weg volgen</div>
                <div id="nav-dist">0 m</div>
            </div>
        </div>
        <div class="progress-bar-bg">
            <div id="progress-fill"></div>
        </div>
        <div id="stats-row">
            <span id="dist-done">0.0 km</span>
            <span id="dist-todo">Geen route</span>
        </div>
        <button id="start-nav-btn" class="btn-nav start" onclick="startNavigation()">▶ START NAVIGATIE</button>
        <button id="stop-nav-btn" class="btn-nav stop" onclick="stopNavigation()">🛑 STOP NAVIGATIE</button>
    </div>

    <div id="main-menu" class="full-page">
        <button class="close-btn" onclick="toggleMenu()">&times;</button>
        <h2 class="accent-text">Menu</h2>
        <button class="btn-primary" onclick="showRoutes()">🗺️ MIJN ROUTES</button>
        <button class="btn-primary" onclick="showSettings()" style="background:#333;">⚙️ INSTELLINGEN</button>
    </div>

    <div id="route-page" class="full-page">
        <button class="close-btn" onclick="closePages()">&times;</button>
        <h2 class="accent-text">Mijn Routes</h2>
        <input type="file" id="gpx-file" style="display:none" accept=".gpx" multiple>
        <button class="btn-primary" onclick="document.getElementById('gpx-file').click()">+ VOEG GPX TOE</button>
        <div id="route-list"></div>
    </div>

    <div id="settings-page" class="full-page">
        <button class="close-btn" onclick="closePages()">&times;</button>
        <h2 class="accent-text">Instellingen</h2>

        <div class="setting-item">
            <label class="setting-label">📱 Kaart Rotatie</label>
            <label class="switch">
                <input type="checkbox" id="auto-rotate-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-item">
            <label class="setting-label">📱 Telefoon Orientatie</label>
            <div class="orientation-options">
                <label class="option-label">
                    <input type="radio" name="phone-orientation" value="vertical" id="vertical-orientation">
                    <span class="option-text">Verticaal</span>
                </label>
                <label class="option-label">
                    <input type="radio" name="phone-orientation" value="horizontal" id="horizontal-orientation">
                    <span class="option-text">Horizontaal</span>
                </label>
            </div>
        </div>

        <div class="setting-item">
            <label class="setting-label">🌐 Offline Modus</label>
            <div class="offline-status" id="offline-status">Online</div>
        </div>

        <p style="opacity:0.6; margin-top:20px;">Problemen? Wis alle lokale gegevens:</p>
        <button class="btn-primary" onclick="resetApp()" style="background:#c0392b;">🔥 RESET ALLE DATA</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
